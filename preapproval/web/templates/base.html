<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pre-Approval Verification{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="brand">Pre-Approval Verification</a>
    <span class="brand-tag">local review assistant</span>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    A human always makes the final approve/deny decision. Evidence is captured from public websites only.
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
